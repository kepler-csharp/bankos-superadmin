name: CI/CD — BankOs SuperAdmin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout del repositorio
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Login en Docker Hub
      # ─────────────────────────────────────────
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ─────────────────────────────────────────
      # 3. Build y push de la imagen
      # ─────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t ${{ secrets.DOCKER_USER }}/bankossuperadmin:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/bankossuperadmin:latest

      # ─────────────────────────────────────────
      # 4. Copiar docker-compose.prod.yml a la VPS
      # ─────────────────────────────────────────
      - name: Copiar docker-compose.prod.yml a la VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "docker-compose.yml"
          target: "/BankOS/SuperAdmin"
            
      # ─────────────────────────────────────────
      # 5. Escribir .env y levantar contenedores en la VPS
      # ─────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /BankOS/SuperAdmin

            echo "── Escribir .env ──"
            cat > .env << EOF
            DOCKER_USER=${{ secrets.DOCKER_USER }}
            API_BASE=${{ secrets.API_BASE }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_ADDRESS=${{ secrets.SMTP_USERNAME }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY  }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_CENTRAL=${{ secrets.DB_CENTRAL }}
            DB_TENANT_PREFIX=${{ secrets.DB_TENANT_PREFIX }}   
            DB_DOMAIN_SUFFIX=${{ secrets.DB_DOMAIN_SUFFIX }}
            EOF
                          
            echo "── Pull latest image ──"
            docker pull ${{ secrets.DOCKER_USER }}/bankossuperadmin:latest
              
            echo "── Bajar stack anterior ──"
            docker compose -f docker-compose.yml down --remove-orphans
              
            echo "── Levantar stack ──"
            docker compose -f docker-compose.yml up -d
              
            echo "── Verificar estado (esperar healthchecks) ──"
            sleep 15
            docker compose -f docker-compose.yml ps
              
            echo "── Remove dangling images ──"
            docker image prune -f
              
            echo "✅ Deploy completado"
